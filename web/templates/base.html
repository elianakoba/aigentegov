<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ title or "Agendamento" }}</title>

  <!-- =====================================================
       BOOTSTRAP CSS (NECESSÁRIO PARA MODAL FUNCIONAR)
  ====================================================== -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- =====================================================
       CSS DO SISTEMA (MANTIDO)
  ====================================================== -->
  <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img
          src="/static/img/LogoAiGenteGov_SemSlogan.png"
          alt="AiGENTEGOV"
        >
      </div>

      <nav class="nav">
        <a
          href="/home"
          class="{{ 'active' if active_page=='home' else '' }}"
        >
          Dashboard
        </a>

        <a
          href="/agendas"
          class="{{ 'active' if active_page=='agendas' else '' }}"
        >
          Consultar agendas
        </a>

        <a
          href="/central_agenda"
          class="{{ 'active' if active_page=='central_agenda' else '' }}"
        >
          Central de Agendas
        </a>

        <a href="/logout">Sair</a>
      </nav>
    </aside>

    <div class="content">
      <header class="header">
        <div class="header-title">
          {{ header_title or "Dashboard" }}
        </div>
        <div class="header-user">
          {{ user_email or "" }}
        </div>
      </header>

      <main class="main">
        {% block content %}{% endblock %}
      </main>

      <footer class="footer">
        AiGENTEGOV • Módulo de Agendamento (MVP) • Ambiente local
      </footer>
    </div>
  </div>

  <!-- =====================================================
       BOOTSTRAP JS (CONTROLADOR DOS MODAIS)
  ====================================================== -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- =====================================================
       SCRIPTS ESPECÍFICOS DE CADA PÁGINA
  ====================================================== -->
  {% block scripts %}{% endblock %}
</body>
</html>
