{% extends "base.html" %}
{% block content %}

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<div class="card">

  <!-- =========================
       Filtros principais
  ========================== -->
  <div class="grid-4">
    <select id="filtro-servico" class="input">
      <option value="">Todos os Serviços</option>
      {% for id, nome in especialidades %}
        <option value="{{ id }}">{{ nome }}</option>
      {% endfor %}
    </select>

    <select id="filtro-profissional" class="input">
      <option value="">Todos os Profissionais</option>
      {% for id, nome in profissionais %}
        <option value="{{ id }}">{{ nome }}</option>
      {% endfor %}
    </select>

    <select id="filtro-unidade" class="input">
      <option value="">Todas as Unidades</option>
      {% for id, nome in unidades %}
        <option value="{{ id }}">{{ nome }}</option>
      {% endfor %}
    </select>

    <input
      id="filtro-idpessoa"
      class="input"
      placeholder="ID Pessoa (opcional)"
      type="number"
    >
  </div>

  <!-- =========================
       Filtros de visualização
  ========================== -->
  <div class="grid-4" style="margin-top: 8px;">
    <select id="filtro-modo" class="input">
      <option value="todos">Todos</option>
      <option value="disponiveis">Disponíveis</option>
      <option value="ocupados">Ocupados</option>
    </select>

    <input
      type="number"
      id="filtro-ano"
      class="input"
      placeholder="Ano"
      min="2020"
    >

    <select id="filtro-mes" class="input">
      <option value="1">Janeiro</option>
      <option value="2">Fevereiro</option>
      <option value="3">Março</option>
      <option value="4">Abril</option>
      <option value="5">Maio</option>
      <option value="6">Junho</option>
      <option value="7">Julho</option>
      <option value="8">Agosto</option>
      <option value="9">Setembro</option>
      <option value="10">Outubro</option>
      <option value="11">Novembro</option>
      <option value="12">Dezembro</option>
    </select>

    <!-- Pesquisa acontece automaticamente via JS -->
    <button class="btn btn-primary" disabled>
      Pesquisar
    </button>
  </div>

  <!-- =========================
       Calendário
  ========================== -->
  <div id="calendario" class="calendar"></div>

  <!-- =========================
       Lista de horários
  ========================== -->
  <div id="lista-horarios" class="list"></div>

</div>

<!-- ===================================================== -->
<!-- MODAL | AGENDAR ATENDIMENTO -->
<!-- ===================================================== -->
<div class="modal fade" id="modalAgendar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Detalhes do Agendamento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Dados do horário -->
        <table class="table table-sm table-borderless mb-4">
          <thead class="text-muted">
            <tr>
              <th>Hora</th>
              <th>Especialidade</th>
              <th>Profissional</th>
              <th>Unidade</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td id="modal-hora">--:--</td>
              <td id="modal-especialidade">-</td>
              <td id="modal-profissional">-</td>
              <td id="modal-unidade">-</td>
            </tr>
          </tbody>
        </table>

        <hr>

        <!-- Busca do cidadão -->
        <label class="form-label fw-bold">Dados do Cidadão</label>

        <div class="input-group mb-2">
          <input
            type="text"
            id="busca-cidadao"
            class="form-control"
            placeholder="Buscar por CPF ou Registro Municipal"
          >
          <button
            class="btn btn-warning"
            id="btn-buscar-cidadao"
            type="button"
          >
            Buscar
          </button>
        </div>

        <!-- Card do cidadão -->
        <div id="card-cidadao" class="border rounded p-3 mt-3 d-none">
          <p><strong>Nome:</strong> <span id="cidadao-nome"></span></p>
          <p><strong>CPF / Registro:</strong> <span id="cidadao-doc"></span></p>
          <p><strong>Contato:</strong> <span id="cidadao-contato"></span></p>
          <p><strong>Endereço:</strong> <span id="cidadao-endereco"></span></p>
        </div>

      </div>

      <div class="modal-footer">
        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
          type="button"
        >
          Cancelar
        </button>

        <button
          class="btn btn-warning"
          id="btn-confirmar-agendamento"
          type="button"
          disabled
        >
          Confirmar Agendamento
        </button>
      </div>

    </div>
  </div>
</div>

<!-- JS SEMPRE POR ÚLTIMO -->
<script src="/static/js/central_agenda.js"></script>

{% endblock %}
